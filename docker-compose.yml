version: "3.8"

services:

  mongodb:
    image: mongo:7
    container_name: letsplay-mongodb
    restart: always

    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_DATABASE: letsplay

    volumes:
      - mongodb_data:/data/db

  mongo-express:
    image: mongo-express
    container_name: letsplay-mongo-express
    restart: always

    ports:
      - "8081:8081"

    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin

    depends_on:
      - mongodb

volumes:
  mongodb_data: