# Server
server.port=8080

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/letsplay
spring.data.mongodb.database=letsplay

# JWT
app.jwt.secret=YourSuperSecretKeyThatIsAtLeast256BitsLongForHS256AlgorithmSecurity
app.jwt.expiration-ms=86400000

# Security
spring.security.user.password=disabled

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.letsplay=DEBUG
